<script>
async function getPostData() {
  const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRV26_s7Hhmks0YNFaDptdjo5z3i6rP6XZ1-VAG2rMydO9vpxdCllHJcB98mEPXIPstvwVOjWhJwzvG/pub?output=csv";
  const response = await fetch(csvUrl);
  const text = await response.text();

  const rows = text.trim().split("\n");

  // second row = actual data
  const row = rows[1];

  // Parse first comma outside quotes
  let inQuotes = false;
  let splitIndex = -1;

  for (let i = 0; i < row.length; i++) {
    const ch = row[i];

    if (ch === '"') {
      inQuotes = !inQuotes;
    } else if (ch === "," && !inQuotes) {
      splitIndex = i;
      break;
    }
  }

  if (splitIndex === -1) {
    throw new Error("Could not parse CSV row");
  }

  const url = row.slice(0, splitIndex)
    .replace(/^"|"$/g, "")
    .trim();

  const fieldsJson = row.slice(splitIndex + 1)
    .replace(/^"|"$/g, "")
    .replace(/""/g, '"')
    .trim();

  return {
    url: url,
    fields: JSON.parse(fieldsJson)
  };
}
</script>
