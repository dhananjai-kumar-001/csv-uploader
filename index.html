<script>
async function getPostData() {
  const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRV26_s7Hhmks0YNFaDptdjo5z3i6rP6XZ1-VAG2rMydO9vpxdCllHJcB98mEPXIPstvwVOjWhJwzvG/pubhtml";
  const response = await fetch(csvUrl);
  const text = await response.text();

  const rows = text.trim().split("\n");

  // If you have headers in row 1, use row 2
  const row = rows.length > 1 ? rows[1] : rows[0];

  // Split into 2 columns only
  const parts = row.split(/,(.+)/);

  const url = parts[0].replace(/^"|"$/g, "").trim();
  const fieldsJson = parts[1]
    .replace(/^"|"$/g, "")
    .replace(/""/g, '"')
    .trim();

  return {
    url: url,
    fields: JSON.parse(fieldsJson)
  };
}

async function uploadFile() {
  const fileInput = document.getElementById("fileInput");
  const status = document.getElementById("status");

  if (!fileInput.files.length) {
    status.innerText = "Please select a file.";
    return;
  }

  status.innerText = "Fetching upload key...";

  const postData = await getPostData();

  status.innerText = "Uploading...";

  const form = document.createElement("form");
  form.method = "POST";
  form.action = postData.url;
  form.enctype = "multipart/form-data";

  // Required S3 fields
  for (const [key, value] of Object.entries(postData.fields)) {
    const input = document.createElement("input");
    input.type = "hidden";
    input.name = key;
    input.value = value;
    form.appendChild(input);
  }

  // File field
  const fileField = document.createElement("input");
  fileField.type = "file";
  fileField.name = "file";

  const dt = new DataTransfer();
  dt.items.add(fileInput.files[0]);
  fileField.files = dt.files;

  form.appendChild(fileField);
  document.body.appendChild(form);

  form.submit();
}
</script>
