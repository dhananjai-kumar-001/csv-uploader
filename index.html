<script>
async function getPostData() {
  const sheetUrl = "https://docs.google.com/spreadsheets/d/1RgTqORIk9X2pOl6ZD6-1-itbLxZqJUgNWuxzWrqFE3o/gviz/tq?tqx=out:json";
  const response = await fetch(sheetUrl);
  const text = await response.text();

  const match = text.match(/google\.visualization\.Query\.setResponse\((.*)\);/s);

  if (!match) {
    throw new Error("Could not parse Google Sheet response");
  }

  const data = JSON.parse(match[1]);

  const row = data.table.rows[0];

  const url = row.c[0]?.v;
  const fieldsJson = row.c[1]?.v;

  if (!url || !fieldsJson) {
    throw new Error("Could not read A2/B2 values");
  }

  return {
    url: url,
    fields: JSON.parse(fieldsJson)
  };
}
</script>
