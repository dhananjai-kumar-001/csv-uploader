<!DOCTYPE html>
<html>
<head>
  <title>CSV Upload Tool</title>
  <style>
    body {
      font-family: Arial;
      max-width: 500px;
      margin: 40px auto;
      padding: 20px;
    }
    button {
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
    }
    #status {
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <h2>Upload CSV File</h2>

  <input type="file" id="fileInput" accept=".csv" />
  <br><br>

  <button onclick="uploadFile()">Upload & Process</button>

  <p id="status"></p>

  <script>
    async function getUploadUrl() {
      const csvUrl = "PASTE_YOUR_PUBLISHED_CSV_LINK";
      const response = await fetch(csvUrl);
      const text = await response.text();

      const rows = text.split("\n");
      return rows[1].replace(/"/g, "").trim();
    }

    async function uploadFile() {
      const fileInput = document.getElementById("fileInput");
      const status = document.getElementById("status");

      if (!fileInput.files.length) {
        status.innerText = "Please select a CSV file.";
        return;
      }

      status.innerText = "Fetching upload key...";

      const uploadUrl = await getUploadUrl();

      status.innerText = "Uploading...";

      const form = document.createElement("form");
      form.method = "POST";
      form.action = uploadUrl;
      form.enctype = "multipart/form-data";

      const fileField = document.createElement("input");
      fileField.type = "file";
      fileField.name = "file";

      const dt = new DataTransfer();
      dt.items.add(fileInput.files[0]);
      fileField.files = dt.files;

      form.appendChild(fileField);
      document.body.appendChild(form);

      form.submit();

      status.innerText =
        "Upload submitted. Processing will start in next cron run.";
    }
  </script>
</body>
</html>
